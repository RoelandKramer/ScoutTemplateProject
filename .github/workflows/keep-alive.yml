name: Keep Streamlit alive

on:
  schedule:
    # Runs every 6 hours: midnight, 06:00, 12:00, 18:00 UTC
    - cron: "0 */6 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Bump keepalive timestamp
        run: |
          echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > .keepalive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: keep alive $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
